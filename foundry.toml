[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.33"
no_match_coverage = "(test|script)"

[profile.release]
optimizer = true
optimizer_runs = 200
via_ir = true

# remappings = [
#     "forge-std/=lib/forge-std/src/",
#     "src/=src/",
#     "support/=test/_support/"
# ]

[lint]
exclude_lints = [
    "mixed-case-function", 
    "screaming-snake-case-const", 
    "screaming-snake-case-immutable",
    "unaliased-plain-import",
    "unused-import",
    "unwrapped-modifier-logic"
]

[fuzz]
runs = 64

[profile.ci.fuzz]
runs = 128

[profile.full.fuzz]
runs = 256

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
